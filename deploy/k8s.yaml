apiVersion: apps/v1
kind: Deployment
metadata: { name: hookcraft, labels: { app: hookcraft } }
spec:
  replicas: 1
  selector: { matchLabels: { app: hookcraft } }
  template:
    metadata: { labels: { app: hookcraft } }
    spec:
      containers:
        - name: hookcraft
          image: ghcr.io/cognis-digital/hookcraft:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: hookcraft }
spec:
  selector: { app: hookcraft }
  ports: [{ port: 80, targetPort: 8000 }]
